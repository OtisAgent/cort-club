<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CØRT. — Connecting</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    max-width: 560px;
    width: 100%;
    border: 1px solid #333;
    padding: 2.5rem;
    text-align: center;
  }
  .logo {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 2rem;
  }
  .logo span { color: #FFEA00; }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; }
  .status { font-size: 0.9rem; color: #888; margin-bottom: 2rem; }
  .code-box {
    background: #111;
    border: 1px solid #333;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    word-break: break-all;
    font-family: monospace;
    font-size: 0.85rem;
    color: #FFEA00;
    text-align: left;
    display: none;
  }
  .copy-btn {
    background: #FFEA00;
    color: #000;
    border: none;
    padding: 0.75rem 2rem;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
    margin: 0 auto 1rem;
  }
  .copy-btn:hover { background: #ffe000; }
  .note { font-size: 0.8rem; color: #666; }
  .error { color: #ff4444; }
  .tick { font-size: 2rem; margin-bottom: 1rem; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">cørt<span>.</span></div>
  <div class="tick" id="tick">✓</div>
  <h1 id="title">Connecting to Shopify…</h1>
  <p class="status" id="status">Reading authorisation code</p>
  <div class="code-box" id="codeBox"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy Code</button>
  <p class="note" id="note"></p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const errorDesc = params.get('error_description');

  if (error) {
    document.getElementById('title').textContent = 'Authorisation Declined';
    document.getElementById('status').innerHTML = '<span class="error">' + (errorDesc || error) + '</span>';
    document.getElementById('note').textContent = 'Close this tab and try again.';
  } else if (code) {
    document.getElementById('tick').style.display = 'block';
    document.getElementById('title').textContent = 'Authorisation Code Ready';
    document.getElementById('status').textContent = 'Send this code to OTIS via the secure form in chat — it expires in 10 minutes.';
    document.getElementById('codeBox').textContent = code;
    document.getElementById('codeBox').style.display = 'block';
    document.getElementById('copyBtn').style.display = 'block';
    document.getElementById('note').textContent = 'Do not share this code anywhere other than the secure OTIS form.';
    // auto-copy
    try { navigator.clipboard.writeText(code); } catch(e) {}
  } else {
    document.getElementById('title').textContent = 'No Code Received';
    document.getElementById('status').textContent = 'This page should only be accessed via the Shopify redirect. Try the install URL again.';
  }

  function copyCode() {
    const code = document.getElementById('codeBox').textContent;
    navigator.clipboard.writeText(code).then(() => {
      document.getElementById('copyBtn').textContent = 'Copied!';
      setTimeout(() => { document.getElementById('copyBtn').textContent = 'Copy Code'; }, 2000);
    });
  }
</script>
</body>
</html>
